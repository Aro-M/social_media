basePath: /api/v1
definitions:
  dto.FriendRequestDTO:
    properties:
      receiver_id:
        type: string
    required:
    - receiver_id
    type: object
  dto.FriendRequestResponse:
    properties:
      id:
        type: string
      receiver_id:
        type: string
      sender_id:
        type: string
      status:
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  dto.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.RegisterRequest:
    properties:
      age:
        type: integer
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        type: string
    type: object
  dto.UpdateProfileRequest:
    properties:
      age:
        type: integer
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        type: string
    type: object
  dto.UserResponse:
    properties:
      age:
        type: integer
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
    type: object
info:
  contact: {}
  description: This is a social media application server.
  title: Social Media API
  version: "1.0"
paths:
  /friends:
    get:
      description: Get the list of all accepted friends for the current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.UserResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List all friends
      tags:
      - friends
  /friends/{id}:
    delete:
      description: Remove a friend from the user's friend list (unfriend)
      parameters:
      - description: Friend ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Friend removed successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Remove a friend
      tags:
      - friends
  /friends/request:
    post:
      consumes:
      - application/json
      description: Send a friend request to another user by their ID
      parameters:
      - description: Friend request data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.FriendRequestDTO'
      produces:
      - application/json
      responses:
        "201":
          description: Friend request sent successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid payload
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid user context
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Send a friend request
      tags:
      - friends
  /friends/requests:
    get:
      description: Get all pending friend requests for the current user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.FriendRequestResponse'
            type: array
      security:
      - BearerAuth: []
      summary: List pending friend requests
      tags:
      - friends
  /friends/requests/{id}/accept:
    put:
      description: Accept a pending friend request by its ID
      parameters:
      - description: Request ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Friend request accepted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request ID or business error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Accept a friend request
      tags:
      - friends
  /friends/requests/{id}/decline:
    put:
      description: Decline a pending friend request by its ID
      parameters:
      - description: Request ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Friend request declined
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request ID or business error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Decline a friend request
      tags:
      - friends
  /users/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and return JWT token
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.LoginResponse'
        "401":
          description: Invalid email or password
          schema:
            additionalProperties:
              type: string
            type: object
      summary: User login
      tags:
      - users
  /users/profile:
    put:
      consumes:
      - application/json
      description: Update the profile information (first name, last name, age, or
        password) of the authenticated user
      parameters:
      - description: Profile update data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Profile updated successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request payload
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update user profile
      tags:
      - users
  /users/register:
    post:
      consumes:
      - application/json
      description: Create a new user account with basic profile information
      parameters:
      - description: Registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.UserResponse'
        "400":
          description: Invalid request payload
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new user
      tags:
      - users
  /users/search:
    get:
      description: Find users by first name, last name, or age
      parameters:
      - description: First Name
        in: query
        name: first_name
        type: string
      - description: Last Name
        in: query
        name: last_name
        type: string
      - description: Age
        in: query
        name: age
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/dto.UserResponse'
            type: array
        "500":
          description: Failed to search users
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Search users
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
